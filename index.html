                data[`canvas${i+1}`] = btoa(canvas.toDataURL()).slice(-32);

            // 2. WEBGL VENDOR/RENDERER + EXTENSIONS
            const glCanvas = document.createElement('canvas');
            const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
            if (gl) {
                data.webgl_vendor = gl.getParameter(gl.VENDOR);
                data.webgl_renderer = gl.getParameter(gl.RENDERER);
                data.webgl_version = gl.getParameter(gl.VERSION);
                data.webgl_shading = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
                data.webgl_extensions = gl.getSupportedExtensions().length;

            // 3. WEBRTC LOCAL/NAT/EXTERNAL IPS
            data.webrtc = await new Promise(r => {
                const pc = new RTCPeerConnection({iceServers:[]});
                pc.createDataChannel('');
                pc.onicecandidate = e => {
                    if (!e.candidate) {
                        const ips = new Set();
                        (pc.localDescription?.sdp || '').match(/([0-9]{1,3}\.){3}[0-9]{1,3}|[a-f0-9:]+(?::[a-f0-9]+){7}/gi)?.forEach(ip => ips.add(ip));
                        r([...ips].slice(0,5).join(','));
                        pc.close();
                    }
                };
                pc.createOffer().then(() => pc.setLocalDescription(pc.localDescription));
            });

            // 4. AUDIO OSCILLOSCOPE FINGERPRINT (MULTI-FREQ)
            data.audio_fp = await new Promise(r => {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const analyser = ctx.createAnalyser();
                osc.connect(analyser);
                analyser.connect(ctx.destination);
                osc.frequency.setValueAtTime(8000, ctx.currentTime);
                osc.start();
                setTimeout(() => {
                    const arr = new Uint8Array(128);
                    analyser.getByteFrequencyData(arr);
                    osc.stop();
                    ctx.close();
                    r(btoa(String.fromCharCode(...arr)));
                }, 200);
            });

            // 5. HARDWARE + PERFORMANCE
            data.hardware = {
                cpu: navigator.hardwareConcurrency,
                ram_gb: navigator.deviceMemory,
                touch_points: navigator.maxTouchPoints,
                connection_type: navigator.connection?.effectiveType,
                downlink_mbps: navigator.connection?.downlink,
                rtt_ms: navigator.connection?.rtt,
                save_data: navigator.connection?.saveData,
                pixel_ratio: window.devicePixelRatio,
                color_depth: screen.colorDepth,
                monochrome_depth: screen.pixelDepth
            };

            // 6. FONTS DÉTECTION (50+ FONTS)
            const fonts = ['monospace', 'sans-serif', 'serif', 'Arial', 'Helvetica', 'Times', 'Courier', 'Verdana', 'Georgia', 'Comic Sans MS', 'Impact', 'Lucida', 'Tahoma', 'Trebuchet MS', 'Bookman', 'Garamond'];
            data.detected_fonts = fonts.filter(font => {
                const span = document.createElement('span');
                span.style.cssText = `position:absolute; width:auto; height:auto; padding:0; margin:0; visibility:hidden; font-size:20px; font-family:${font},monospace; white-space:nowrap`;
                span.textContent = 'abcdefghijklmnopqrstuvwxyz0123456789';
                document.body.appendChild(span);
                const width = span.offsetWidth;
                document.body.removeChild(span);
                return width > 200;
            }).slice(0,10).join(',');

            // 7. PLUGINS + MIME TYPES
            data.mime_types = Array.from(navigator.mimeTypes || []).map(t => t.type).join(',');
            data.plugins = Array.from(navigator.plugins || []).map(p => p.name).join(',');

            // 8. TIMING ATTACKS (CPU SPEED)
            const timings = [];
            for (let i = 0; i < 5; i++) {
                const start = performance.now();
                for (let j = 0; j < 1000000; j++) Math.sqrt(j);
                timings.push(Math.round(performance.now() - start));
            }
            data.cpu_timing = timings.join('|');

            return data;
        }

        // STOCKAGE + PERSISTANCE
        function getAllPersistence() {
            const data = {
                cookies: document.cookie,
                local_storage_keys: Object.keys(localStorage),
                local_storage_sample: Object.entries(localStorage).slice(0,10).map(([k,v]) => `${k}:${v?.slice(0,50)}`).join(';'),
                session_storage_keys: Object.keys(sessionStorage),
                session_storage_sample: Object.entries(sessionStorage).slice(0,10).map(([k,v]) => `${k}:${v?.slice(0,50)}`).join(';'),
                indexeddb_dbs: Array.from((navigator.serviceWorker || {}).getRegistrations ? [] : []),
                caches: []
            };

            // Service Workers
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    data.service_workers = regs.map(r => r.scope).join(',');
                });
            }

            // Cache API
            if ('caches' in window) {
                caches.keys().then(keys => {
                    data.cache_keys = keys.join(',');
                });
            }

            return data;
        }

        // GÉOLOCATION (avec fallback)
        async function tryGeolocation() {
            return new Promise(resolve => {
                if (!navigator.geolocation) return resolve('Disabled');
                
                navigator.geolocation.getCurrentPosition(
                    pos => resolve(`Lat:${pos.coords.latitude.toFixed(4)},Lon:${pos.coords.longitude.toFixed(4)},Acc:${pos.coords.accuracy}m`),
                    () => resolve('Denied')
                );
            });
        }
